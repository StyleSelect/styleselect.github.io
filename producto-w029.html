<!doctype html>
<html lang="es">
  <head>

    <header class="site-header solid">
      <nav class="nav" aria-label="Navegacion principal">

        <div class="nav-links">

          <a href="catalogo.html">Catalogo</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="product-detail-hero">

            <div class="image-stage">
              <img class="product-image" src="assets/products/w029-transparent.png" alt="Vista frontal del W029">

            <div class="thumb-row">
              <button class="thumb-button is-active" type="button" data-image="assets/products/w029-transparent.png" data-alt="Vista frontal del W029" aria-pressed="true"><img class="thumb" src="assets/products/w029-transparent.png" alt=""></button>
